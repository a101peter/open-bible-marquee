  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #191919;

    height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

  }

  .marquee-container {
    width: 100%;
    position: relative;
    padding: 12px 0;
  }

  /* Top stats bar - continuous scroll */
  .stats-track {
    display: flex;
    animation: scrollLeft 30s linear infinite;
    width: max-content;
  }

  .stats-track .stats-set {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 0 24px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .stats-track .stat {
    font-family: 'Noto Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
  }

  .stats-track .stat .num {
    color: rgba(180, 160, 120, 0.8);
  }

  .stats-track .dot {
    color: rgba(180, 160, 120, 0.3);
    font-size: 6px;
  }

  @keyframes scrollLeft {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Divider */
  .divider {
    width: 80%;
    max-width: 600px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180, 160, 120, 0.3), transparent);
    margin: 10px auto;
  }

  /* Main tagline - fade cycle */
  .tagline-area {
    text-align: center;
    padding: 8px 20px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .tagline-slide {
    position: absolute;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    text-align: center;
    width: 90%;
  }

  .tagline-slide.active {
    opacity: 1;
  }

  .tagline-slide .lang-label {
    font-family: 'Noto Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(180, 160, 120, 0.6);
    margin-bottom: 6px;
  }

  .tagline-slide .lang-label .flag {
    font-size: 13px;
    letter-spacing: 0;
    text-transform: none;
    vertical-align: middle;
    margin-right: 4px;
  }

  .tagline-slide .main-text {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.92);
    line-height: 1.4;
  }

  .tagline-slide .sub-text {
    font-size: 12px;
    font-style: italic;
    color: rgba(255, 255, 255, 0.45);
    margin-top: 4px;
  }

  /* Bottom accent */
  .bottom-accent {
    text-align: center;
    padding: 6px;
  }

  .bottom-accent span {
    font-family: 'Noto Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(180, 160, 120, 0.35);
  }

  /* Glow effect behind tagline */
  .tagline-area::before {
    content: '';
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(180, 160, 120, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }
</style>

`;

// Build stats scroller (duplicate for seamless loop)
const statsTrack = document.getElementById('statsTrack');
for (let i = 0; i < 4; i++) {
  const set = document.createElement('div');
  set.className = 'stats-set';
  set.innerHTML = statsHTML;
  statsTrack.appendChild(set);
}

// Build tagline slides
const taglineArea = document.getElementById('taglineArea');
taglines.forEach((t, i) => {
  const slide = document.createElement('div');
  slide.className = 'tagline-slide' + (i === 0 ? ' active' : '');
  slide.innerHTML = `
    <div class="lang-label"><span class="flag">${t.flag}</span> ${t.lang}</div>
    <div class="main-text">${t.text}</div>
    <div class="sub-text">${t.sub}</div>
  `;
  taglineArea.appendChild(slide);
});

// Cycle taglines
let currentIndex = 0;
const slides = document.querySelectorAll('.tagline-slide');

setInterval(() => {
  slides[currentIndex].classList.remove('active');
  currentIndex = (currentIndex + 1) % slides.length;
  slides[currentIndex].classList.add('active');
}, 3500);
